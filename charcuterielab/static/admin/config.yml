backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text"}
      - label: "Category"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - "Pairing Science"
          - "Ingredient Deep Dives"
          - "Board Ideas"
          - "Food History"
          - "Myth Busting"
          - "Tips & Tricks"
          - "Seasonal Boards"
          - "International Boards"
          - "Budget Boards"
          - "Luxury Boards"
      - {label: "Read Time", name: "readtime", widget: "string", default: "5 min"}
      - {label: "Emoji", name: "emoji", widget: "string", default: "🧀", required: false}
      - {label: "Featured Post", name: "featured", widget: "boolean", default: false}
      - {label: "Body", name: "body", widget: "markdown"}
